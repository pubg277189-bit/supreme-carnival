name: Build NDK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Unzip and build
        run: |
          unzip jni.zip -d ./jni_source
          cd ./jni_source
          if [ -d "jni" ]; then
            cd jni
          fi
          ${ANDROID_NDK_HOME}/ndk-build

      - name: Upload libs
        uses: actions/upload-artifact@v4
        with:
          name: compiled-libs
          path: ./jni_source/libs/
